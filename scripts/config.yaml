# Migration Configuration
source:
  account_id: "111111111111"
  region: "ap-southeast-1"
  profile: "source-account"

target:
  account_id: "222222222222"
  region: "ap-southeast-7"
  profile: "target-account"

# KMS key ARN in target account (created by Terraform)
target_kms_key_arn: "arn:aws:kms:ap-southeast-7:222222222222:key/YOUR_KEY_ID"

# EC2 migration
ec2:
  instance_ids:
    - "i-0abc123def456"

# S3 migration
s3:
  buckets:
    - source: "my-source-bucket"
      target: "my-target-bucket"

# RDS migration
rds:
  instances:
    - db_instance_id: "mydb-prod"
      target_instance_class: "db.r6g.large"
      target_subnet_group: "my-target-subnet-group"
